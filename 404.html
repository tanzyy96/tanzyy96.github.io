<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>404 — lost in space</title>
	<link rel="shortcut icon" href="/favicon.ico">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=Space+Mono&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="/css/style.css">
	<style>
		.nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 2rem; }
		.nf-code { font-family: var(--font-display); font-size: clamp(5rem, 22vw, 12rem); line-height: 1;
			background: linear-gradient(120deg, var(--accent), var(--accent-2));
			-webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
		.nf p { color: var(--ink-soft); margin: 1rem 0 2rem; font-size: 1.1rem; }
	</style>
</head>

<body>
	<div class="nf">
		<div>
			<div class="nf-code">404</div>
			<p>This page shipped without a destination. Classic.</p>
			<a href="/" class="btn btn-primary">← Back home</a>
		</div>
	</div>
	<script>
		(function () {
			var s = localStorage.getItem("theme");
			if (s) document.documentElement.setAttribute("data-theme", s);
			else if (matchMedia("(prefers-color-scheme: dark)").matches)
				document.documentElement.setAttribute("data-theme", "dark");
		})();
	</script>
</body>

</html>
