				<li>⌨️ Open <b>Terminal</b> and type <code>help</code> — it actually works.</li>
				<li>🐾 Tap the paw in the menu bar to wake a little desktop companion.</li>
			</ul>
			<p class="doc-soft">Why build it this way? Because the best way to show how I think

	<template id="app-thinking">
		<div class="doc">
			<h2>Product engineering, the way I see it</h2>
			<p class="doc-soft">Engineering decisions are product decisions in disguise. The
				principles I keep coming back to:</p>
			<div class="principle"><span>01</span>
				<div><b>Ship to learn.</b> The fastest way to be right is to put something real in
					front of people and watch what happens. Opinions are cheap; behaviour isn't.</div>
			</div>
			<div class="principle"><span>02</span>
				<div><b>The details <em>are</em> the product.</b> Empty states, spinners, the copy
					on a button, 200ms of animation. Users never see the architecture — they feel the
					sum of small decisions.</div>
			</div>
			<div class="principle"><span>03</span>
				<div><b>Own the problem, not the ticket.</b> Give me the goal, not just the spec,
					and I'll often find a simpler thing worth building instead.</div>
			</div>
			<div class="principle"><span>04</span>
				<div><b>Boring tech, interesting problems.</b> Spend the novelty budget on the
					user's problem, not a stack that's exciting for 20 minutes and painful for two years.</div>
			</div>
			<div class="principle"><span>05</span>
				<div><b>Taste is a skill.</b> You build it by shipping, collecting feedback, and
					studying work you admire. Then you trust it, then you check it.</div>
			</div>
			<div class="principle"><span>06</span>
				<div><b>Talk to the humans.</b> Five minutes watching someone use the thing beats
					five hours arguing in a doc.</div>
			</div>
		</div>
	</template>
